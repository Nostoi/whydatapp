{% macro card(title, subtitle="") %}
<section class="card">
  <header class="mb-2">
    <h2 class="text-sm font-semibold tracking-wide uppercase" style="color: var(--color-brand);">{{ title }}</h2>
    {% if subtitle %}<p class="text-xs" style="color: var(--color-fg-faint);">{{ subtitle }}</p>{% endif %}
  </header>
  <div>{{ caller() }}</div>
</section>
{% endmacro %}
