<div class="py-16 text-center">
  <p class="text-sm text-zinc-500 dark:text-zinc-400">
    {{ line | default("No installs yet — capture your first one with <code class=\"font-mono px-1\">why log</code> or let the shell hook do it automatically.") }}
  </p>
  {% if example %}
  <pre class="mt-3 inline-block px-3 py-1.5 rounded-md bg-zinc-100 dark:bg-zinc-800 text-xs font-mono text-zinc-600 dark:text-zinc-400 border border-zinc-200 dark:border-zinc-700">{{ example }}</pre>
  {% endif %}
</div>
