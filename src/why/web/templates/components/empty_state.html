<div class="py-16 text-center">
  <p class="text-sm" style="color: var(--color-fg-muted);">
    {{ line | default("No installs yet — capture your first one with <code class=\"font-mono px-1\">why log</code> or let the shell hook do it automatically.") }}
  </p>
  {% if example %}
  <pre class="mt-3 inline-block px-3 py-1.5 rounded-md text-xs font-mono border"
       style="background-color: var(--color-bg-muted); color: var(--color-fg-muted); border-color: var(--color-border);">{{ example }}</pre>
  {% endif %}
</div>
